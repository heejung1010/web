<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bread:on</title>
    <link rel="stylesheet" href="./style/font.css">
    <link rel="stylesheet" href="./style/reset.css">
    <link rel="stylesheet" href="./style/system.css">
    <link rel="stylesheet" href="./style/common.css">
    <link rel="stylesheet" href="./style/header.css">
    <link rel="stylesheet" href="./style/footer.css">
    <script src="./script/header.js"></script>
    <script src="./script/heart.js"></script>
    <script src="./script/toWon.js"></script>

    <!-- 폰트 -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    
    
    <!-- swiper js -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@12/swiper-bundle.min.css"/>
    <script src="https://cdn.jsdelivr.net/npm/swiper@12/swiper-bundle.min.js"></script>

    <link rel="stylesheet" href="./style/list.css">
    <script src="./script/include.js"></script>
    <script src="./script/listArray.js"></script>
    <script src="./script/listControl.js"></script>
</head>
<body>
    <div id="include-header"></div>

    <main>

        <!-- 서브 배너 -->
         <div class="sub-banner">
            <div class="common-frame">
                <h1>Sandwich Menu</h1>
            </div>
         </div>

         <!-- 타이틀 -->
        <div class="title">
            <div class="common-frame">
                <h3>Sandwiches</h3>
                <p>갓 구운 빵으로 만든 샌드위치</p>
            </div>
        </div>

        <!-- 옵션 -->
        <div class="option">
            <div class="common-frame">
                <div class="total-view">
                    <span>Total</span>
                    <span id="current-count" class="fwb">12</span>
                </div>
                <div>
                    <select id="view-filter" class="b2">
                        <option value="정렬방식">정렬방식</option>
                        <option value="낮은 가격 순">낮은 가격 순</option>
                        <option value="높은 가격 순">높은 가격 순</option>
                        <option value="신상품">신상품</option>
                    </select>
                </div>
            </div>
        </div>

        <!-- 상품 리스트 -->
        <div class="list-wrap">
            <div class="common-frame">
                <ul class="list-grid">
                    <li>
                        <a href="./detail.html">
                            <figure>
                                <img src="./img/list-thumb-Jambon.jpg" alt="잠봉뵈르">
                            </figure>
                            <div class="list-option">
                                <span class="btn-heart">
                                    <img src="./img/icn-heart.svg" alt="좋아요 아이콘">
                                </span>
                            </div>
                            <h4>잠봉뵈르</h4>
                            <p class="fwm">수제 잠봉 햄과 프랑스산 버터로 완성한 클래식한 조화 </p>
                            <div class="price fwb">7,800</div>
                        </a>
                    </li>
                </ul>
            </div>
        </div>


    </main>


    <!-- 푸터 -->
    <div id="include-footer"></div>
</body>
</html>
